services:
  postgres:
    image: postgres:16
    container_name: nome_do_container
    restart: always
    environment:
      POSTGRES_DB: banco_de_dados
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
